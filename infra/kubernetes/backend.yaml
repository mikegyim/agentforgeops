apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: agentforgeops
  labels: { app: backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/agentforgeops-backend:latest
          ports: [{ containerPort: 8000 }]
          env:
            - { name: ENV, value: prod }
            - name: POSTGRES_URL
              valueFrom: { secretKeyRef: { name: agentforge-secrets, key: postgres_url } }
            - { name: QDRANT_URL, value: http://qdrant:6333 }
            - name: ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: agentforge-secrets, key: anthropic_api_key } }
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: "1",  memory: 1Gi }
          readinessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: agentforgeops
spec:
  selector: { app: backend }
  ports:
    - port: 80
      targetPort: 8000
