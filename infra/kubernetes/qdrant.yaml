apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: agentforgeops
spec:
  serviceName: qdrant
  replicas: 1
  selector: { matchLabels: { app: qdrant } }
  template:
    metadata: { labels: { app: qdrant } }
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.11.3
          ports: [{ containerPort: 6333 }]
          volumeMounts:
            - { name: data, mountPath: /qdrant/storage }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: "1", memory: 2Gi }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: agentforgeops
spec:
  selector: { app: qdrant }
  ports:
    - { name: http, port: 6333, targetPort: 6333 }
